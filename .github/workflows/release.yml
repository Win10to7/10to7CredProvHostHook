name: Build and release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build CredProvHostHook
        run: msbuild CredProvHostHook.sln /m /p:Configuration=Release /p:Platform=x64

      - name: Package release
        shell: pwsh
        run: Compress-Archive -Path x64/Release/* -DestinationPath "CredProvHostHook-${{ github.ref_name }}-x64.zip"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: CredProvHostHook-${{ github.ref_name }}-x64.zip
          generate_release_notes: true
